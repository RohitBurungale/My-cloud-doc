<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Cloud Docs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: "Inter", sans-serif;
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  margin: 0;
  min-height: 100vh;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  padding: 16px 28px;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header b {
  font-size: 20px;
}

header .right {
  display: flex;
  align-items: center;
  gap: 14px;
}

header span {
  font-weight: 600;
}

header button {
  background: white;
  color: #4f46e5;
  border: none;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
}

/* MAIN */
.docs {
  max-width: 1100px;
  margin: auto;
  padding: 32px 20px;
}

#welcome {
  font-size: 26px;
  margin-bottom: 20px;
}

/* UPLOAD CARD */
.upload-card {
  background: white;
  padding: 24px;
  border-radius: 16px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
  margin-bottom: 30px;
}

.upload-card h3 {
  margin-top: 0;
}

.upload-card input {
  margin-top: 12px;
}

.upload-card button {
  margin-top: 14px;
  background: #4f46e5;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
}

/* FILE GRID */
.files-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.file-card {
  background: white;
  padding: 18px;
  border-radius: 14px;
  box-shadow: 0 14px 30px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.file-name {
  font-weight: 600;
  word-break: break-word;
}

.file-actions {
  display: flex;
  gap: 10px;
  margin-top: auto;
}

.file-actions button {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: none;
  font-size: 13px;
  cursor: pointer;
}

.download {
  background: #e0e7ff;
  color: #3730a3;
}

.delete {
  background: #fee2e2;
  color: #991b1b;
}

/* EMPTY */
.empty {
  text-align: center;
  padding: 40px;
  color: #6b7280;
  background: white;
  border-radius: 14px;
}

/* MOBILE */
@media (max-width: 600px) {
  header {
    flex-direction: column;
    gap: 10px;
  }
}
</style>
</head>

<body>

<header>
  <b>📄 My Cloud Docs</b>
  <div class="right">
    <span id="userName">User</span>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="docs">
  <h2 id="welcome">Welcome</h2>

  <div class="upload-card">
    <h3>Upload a file</h3>
    <input type="file" id="fileInput">
    <br>
    <button onclick="upload()">Upload</button>
  </div>

  <h3>Your Files</h3>
  <div id="files" class="files-grid"></div>
</div>

<script>
const client = new Appwrite.Client()
  .setEndpoint("https://fra.cloud.appwrite.io/v1")
  .setProject("6956479a002cb6075a9d");

const account = new Appwrite.Account(client);
const storage = new Appwrite.Storage(client);

const BUCKET_ID = "6957d9df0019e749a227";
let userId = null;

async function checkAuth() {
  try {
    const user = await account.get();
    userId = user.$id;
    userName.innerText = user.name || "User";
    welcome.innerText = `Welcome, ${user.name || "User"} 👋`;
    loadFiles();
  } catch {
    window.location.href = "login.html";
  }
}

async function logout() {
  await account.deleteSession("current");
  window.location.href = "login.html";
}

async function upload() {
  const file = fileInput.files[0];
  if (!file) return alert("Select a file");

  await storage.createFile(
    BUCKET_ID,
    Appwrite.ID.unique(),
    file,
    [
      Appwrite.Permission.read(Appwrite.Role.user(userId)),
      Appwrite.Permission.write(Appwrite.Role.user(userId)),
      Appwrite.Permission.delete(Appwrite.Role.user(userId))
    ]
  );
  fileInput.value = "";
  loadFiles();
}

async function loadFiles() {
  const res = await storage.listFiles(BUCKET_ID);
  files.innerHTML = "";

  if (res.files.length === 0) {
    files.innerHTML = `<div class="empty">No files uploaded yet 📂</div>`;
    return;
  }

  res.files.forEach(f => {
    const card = document.createElement("div");
    card.className = "file-card";
    card.innerHTML = `
      <div class="file-name">${f.name}</div>
      <div class="file-actions">
        <button class="download" onclick="download('${f.$id}')">Download</button>
        <button class="delete" onclick="removeFile('${f.$id}')">Delete</button>
      </div>
    `;
    files.appendChild(card);
  });
}

function download(id) {
  window.open(storage.getFileDownload(BUCKET_ID, id));
}

async function removeFile(id) {
  if (!confirm("Delete this file?")) return;
  await storage.deleteFile(BUCKET_ID, id);
  loadFiles();
}

checkAuth();
</script>

</body>
</html>
